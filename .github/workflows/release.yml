name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  validate:
    name: Validate tag vs Cargo versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crate versions match tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          for crate in papertowel papertowel-mcp; do
            CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
              | jq -r --arg name "$crate" '.packages[] | select(.name == $name) | .version')
            if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
              echo "Version mismatch in $crate: Cargo.toml has $CARGO_VERSION, tag is v$TAG_VERSION"
              exit 1
            fi
          done
          echo "All crate versions match tag v$TAG_VERSION ✓"

  publish:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-publish-

      - name: Publish papertowel
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "papertowel") | .version')
          if cargo search papertowel --limit 1 2>/dev/null | grep -q "^papertowel = \"$VERSION\""; then
            echo "papertowel@$VERSION already published, skipping"
          else
            cargo publish -p papertowel
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish papertowel-mcp
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "papertowel-mcp") | .version')
          if cargo search papertowel-mcp --limit 1 2>/dev/null | grep -q "^papertowel-mcp = \"$VERSION\""; then
            echo "papertowel-mcp@$VERSION already published, skipping"
          else
            cargo publish -p papertowel-mcp
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
