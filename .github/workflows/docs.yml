name: papertowel-docs
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'book/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_VER=v0.5.2
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VER}/mdbook-${MDBOOK_VER}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz --directory /usr/local/bin

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build mdBook
        run: mdbook build book

      - name: Build Rustdoc
        run: |
          cargo doc --no-deps
          mkdir -p book/book/api
          cp -r target/doc/* book/book/api/
          echo '<html><head><meta http-equiv="refresh" content="0; url=papertowel/index.html"></head></html>' > book/book/api/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
