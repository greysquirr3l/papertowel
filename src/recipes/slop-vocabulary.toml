# Slop Vocabulary Detection
# 
# Common AI-generated vocabulary patterns. These words are individually
# innocuous but cluster together at high frequency in LLM outputs.
#
# Contribute: Add patterns in `[patterns.words]` or `[patterns.phrases]`.

[recipe]
name = "slop-vocabulary"
version = "1.0.0"
description = "Detects common AI slop vocabulary - words and phrases overused by LLMs"
author = "papertowel"
category = "Lexical"
default_severity = "Low"

[scoring]
cluster_threshold = 4
cluster_range_lines = 15
cluster_severity_boost = "High"
base_confidence = 0.6

[patterns.words]
enabled = true
case_sensitive = false
whole_word = true
severity = "Low"
items = [
    # Transitions (overused by LLMs for "flow")
    { word = "accordingly", replacement = "so" },
    { word = "additionally", replacement = "also" },
    { word = "arguably", replacement = "perhaps" },
    { word = "certainly", replacement = "" },
    { word = "consequently", replacement = "so" },
    { word = "hence", replacement = "so" },
    { word = "moreover", replacement = "also" },
    { word = "nevertheless", replacement = "still" },
    { word = "nonetheless", replacement = "still" },
    { word = "notwithstanding", replacement = "despite that" },
    { word = "thus", replacement = "so" },
    { word = "undoubtedly", replacement = "" },

    # Superlative adjectives
    { word = "adept", replacement = "skilled" },
    { word = "commendable", replacement = "good" },
    { word = "ever-evolving", replacement = "changing" },
    { word = "exciting", replacement = "interesting" },
    { word = "exemplary", replacement = "strong" },
    { word = "invaluable", replacement = "useful" },
    { word = "robust", replacement = "sturdy" },
    { word = "seamless", replacement = "smooth" },
    { word = "synergistic", replacement = "cooperative" },
    { word = "thought-provoking", replacement = "interesting" },
    { word = "transformative", replacement = "significant" },
    { word = "utmost", replacement = "most" },
    { word = "vibrant", replacement = "lively" },
    { word = "vital", replacement = "important" },
    { word = "innovative", replacement = "new" },
    { word = "cutting-edge", replacement = "advanced" },
    { word = "game-changing", replacement = "significant" },
    { word = "pivotal", replacement = "important" },
    { word = "comprehensive", replacement = "thorough" },
    { word = "ergonomic", replacement = "comfortable" },

    # Abstract nouns
    { word = "innovation", replacement = "novelty" },
    { word = "tapestry", replacement = "mix" },
    { word = "realm", replacement = "area" },
    { word = "landscape", replacement = "space" },

    # Verbs
    { word = "aligns", replacement = "matches" },
    { word = "augment", replacement = "add" },
    { word = "delve", replacement = "explore" },
    { word = "embark", replacement = "start" },
    { word = "facilitate", replacement = "help" },
    { word = "leverage", replacement = "use" },
    { word = "maximize", replacement = "increase" },
    { word = "underscores", replacement = "highlights" },
    { word = "utilize", replacement = "use" },
    { word = "harness", replacement = "use" },
    { word = "illuminate", replacement = "explain" },
    { word = "revolutionize", replacement = "transform" },
    { word = "bolster", replacement = "support" },
    { word = "streamline", replacement = "simplify" },
    { word = "leveraging", replacement = "using" },
]

[patterns.phrases]
enabled = true
severity = "Medium"
items = [
    # Hedging phrases
    { match = "it's important to note", suggestion = "note that" },
    { match = "it's important to consider", suggestion = "consider" },
    { match = "it's worth noting that", suggestion = "note:" },
    { match = "on the contrary", suggestion = "however" },
    { match = "that being said", suggestion = "but" },
    { match = "at its core", suggestion = "fundamentally" },
    { match = "to put it simply", suggestion = "simply" },
    { match = "generally speaking", suggestion = "usually" },
    { match = "broadly speaking", suggestion = "generally" },
    { match = "to some extent", suggestion = "partially" },
    { match = "from a broader perspective", suggestion = "" },

    # Marketing speak
    { match = "a testament to", suggestion = "shows" },
    { match = "in summary", suggestion = "" },
    { match = "in conclusion", suggestion = "" },
    { match = "this underscores the importance of", suggestion = "this shows" },
    { match = "a key takeaway is", suggestion = "notably" },
    { match = "shed light on", suggestion = "explain" },
    { match = "sheds light on", suggestion = "explains" },
    { match = "seamless integration", suggestion = "integration" },
    { match = "scalable solution", suggestion = "solution" },
    { match = "actionable insights", suggestion = "insights" },
    { match = "data-driven insights", suggestion = "analysis" },
    { match = "data-driven decisions", suggestion = "decisions" },
    { match = "under the hood", suggestion = "internally" },
    { match = "out of the box", suggestion = "by default" },
    { match = "at the end of the day", suggestion = "ultimately" },
    { match = "ready for production", suggestion = "production-ready" },

    # Verbose phrases
    { match = "as mentioned above", suggestion = "" },
    { match = "for the sake of", suggestion = "for" },
    { match = "in order to", suggestion = "to" },
    { match = "provides a streamlined", suggestion = "provides" },
]
